name: build

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号，例如 v1.0.0（也会作为 Release 的 tag）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Validate version input
        run: |
          version="${{ inputs.version }}"
          if [[ ! "$version" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
            echo "版本号格式不对，应类似 v1.0.0，实际输入: $version"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Compute versionName / versionCode
        run: |
          raw="${{ inputs.version }}"
          version_name="${raw#v}"
          version_code="${version_name//./}"
          echo "VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$version_code" >> "$GITHUB_ENV"
          echo "解析结果: versionName=$version_name versionCode=$version_code"

      - name: Update versionCode / versionName in build.gradle.kts
        run: |
          sed -i "s/^\(\s*versionCode = \).*/\1${VERSION_CODE}/" app/build.gradle.kts
          sed -i "s/^\(\s*versionName = \).*/\1\"${VERSION_NAME}\"/" app/build.gradle.kts
          grep -n "versionCode\|versionName" app/build.gradle.kts

      - name: Build unsigned release APK
        run: ./gradlew assembleRelease --no-daemon

      # ── 签名 ──────────────────────────────────────────────────────────────
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Move and rename APK
        run: |
          mkdir -p out
          cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" out/灵动笔记-${{ inputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: 灵动笔记 ${{ inputs.version }}
          prerelease: false
          make_latest: true
          files: out/灵动笔记-${{ inputs.version }}.apk
