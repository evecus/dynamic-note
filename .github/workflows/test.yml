name: test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Move and rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/*.apk out/灵动笔记-debug.apk

      - name: Move tag "test" to current commit
        run: |
          git tag -f test
          git push origin test --force

      # 用固定 tag "test" 发布/更新一个 prerelease，每次手动运行都会覆盖它
      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test
          name: 灵动笔记 "Debug build (test)"
          body: |
            自动构建的 Debug APK，用于测试。
            提交: ${{ github.sha }}
            构建时间: ${{ github.event.repository.updated_at }}
          prerelease: true
          make_latest: false
          files: out/dynamic-note-debug.apk
